name: Stability Pool Monitor

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: stability-pool-monitor
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      NTFY_AUTH_HEADER: ${{ secrets.NTFY_AUTH_HEADER }}
    outputs:
      new_deployments: ${{ steps.diff.outputs.new_deployments }}
      latest_signature: ${{ steps.latest.outputs.signature }}
      pages_url: ${{ steps.meta.outputs.pages_url }}
      remote_unchanged: ${{ steps.freshness.outputs.remote_unchanged }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync workspace to latest main
        id: synced
        shell: bash
        run: |
          branch="${GITHUB_REF_NAME}"
          git fetch origin "${branch}"
          git checkout -B "${branch}" "origin/${branch}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Compute Pages URL
        id: meta
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [[ "$repo_name" == "${GITHUB_REPOSITORY_OWNER}.github.io" ]]; then
            echo "pages_url=https://${GITHUB_REPOSITORY_OWNER}.github.io/" >> "$GITHUB_OUTPUT"
          else
            echo "pages_url=https://${GITHUB_REPOSITORY_OWNER}.github.io/${repo_name}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Record previous deployment count
        id: previous
        shell: bash
        run: |
          if [[ -f data/stability_pool_deployments.json ]]; then
            echo "count=$(jq '.deployment_count // 0' data/stability_pool_deployments.json)" >> "$GITHUB_OUTPUT"
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Record previous processed deployment signature
        id: processed_previous
        shell: bash
        run: |
          if [[ -f data/last_processed_deployment_signature.txt ]]; then
            echo "signature=$(tr -d '\n' < data/last_processed_deployment_signature.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "signature=" >> "$GITHUB_OUTPUT"
          fi

      - name: Record previous processed sell signature
        id: processed_sell_previous
        shell: bash
        run: |
          if [[ -f data/last_processed_sell_signature.txt ]]; then
            echo "signature=$(tr -d '\n' < data/last_processed_sell_signature.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "signature=" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch latest Hylo stats
        shell: bash
        run: |
          tmp_file="$(mktemp)"
          if curl --fail --silent --show-error \
            'https://hylo.so/api/hylo-stats' \
            -H 'accept: */*' \
            -H 'accept-language: en-US,en;q=0.9' \
            -H 'referer: https://hylo.so/stats' \
            -H 'sec-fetch-dest: empty' \
            -H 'sec-fetch-mode: cors' \
            -H 'sec-fetch-site: same-origin' \
            -H 'user-agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36' \
            > "$tmp_file"; then
            if jq -e '.exchangeStats.levercoinNav and .stabilityPoolStats.levercoinInPool' "$tmp_file" >/dev/null; then
              mv "$tmp_file" data/live_hylo_stats.json
              exit 0
            fi
          fi
          rm -f "$tmp_file"

      - name: Update stability pool dashboard
        shell: bash
        run: |
          bash ./update_stability_pool_deployments.sh --hylo-stats-file data/live_hylo_stats.json

      - name: Record new deployment count
        id: current
        shell: bash
        run: |
          echo "count=$(jq '.deployment_count // 0' data/stability_pool_deployments.json)" >> "$GITHUB_OUTPUT"

      - name: Record latest deployment signature
        id: latest
        shell: bash
        run: |
          echo "signature=$(jq -r '.lots[-1].signature // empty' data/stability_pool_deployments.json)" >> "$GITHUB_OUTPUT"

      - name: Resolve latest confirmed sell
        id: latest_sell
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          REQUIRED_HINTS = {"SwapLeverToStable"}
          best_key = None
          latest_sell = None
          backfill_path = Path("data/stability_pool_balance_changes_full.jsonl")
          if backfill_path.exists():
              with backfill_path.open("r", encoding="utf-8") as handle:
                  for line in handle:
                      line = line.strip()
                      if not line:
                          continue
                      row = json.loads(line)
                      if row.get("action") != "sell_xsol":
                          continue
                      if not REQUIRED_HINTS.issubset(set(row.get("log_hints") or [])):
                          continue
                      key = (
                          row.get("slot") or 0,
                          row.get("block_time") or 0,
                          row.get("signature") or "",
                      )
                      if latest_sell is None or key > best_key:
                          best_key = key
                          latest_sell = row

          affected_lots = []
          deployments_path = Path("data/stability_pool_deployments.json")
          if latest_sell and deployments_path.exists():
              payload = json.loads(deployments_path.read_text(encoding="utf-8"))
              for lot in payload.get("lots") or []:
                  allocations = [
                      alloc
                      for alloc in (lot.get("sell_allocations") or [])
                      if alloc.get("sell_signature") == latest_sell.get("signature")
                  ]
                  if allocations:
                      affected_lots.append((lot, allocations))

          out_path = Path(os.environ["GITHUB_OUTPUT"])

          def write(key, value):
              with out_path.open("a", encoding="utf-8") as handle:
                  handle.write(f"{key}={value}\n")

          if not latest_sell:
              for key in (
                  "signature",
                  "utc",
                  "local",
                  "xsol_sold",
                  "hyusd_received",
                  "sale_price",
                  "affected_lot_count",
                  "closed_lot_count",
                  "partial_lot_count",
              ):
                  write(key, "")
          else:
              write("signature", latest_sell.get("signature") or "")
              write("utc", latest_sell.get("utc") or "")
              write("local", latest_sell.get("local") or "")
              write("xsol_sold", abs(float((latest_sell.get("xsol_pool") or {}).get("delta") or 0.0)))
              write("hyusd_received", float((latest_sell.get("hyusd_pool") or {}).get("delta") or 0.0))
              write("sale_price", latest_sell.get("estimated_hyusd_per_xsol") or "")
              write("affected_lot_count", len(affected_lots))
              write("closed_lot_count", sum(1 for lot, _allocs in affected_lots if lot.get("status") == "closed"))
              write("partial_lot_count", sum(1 for lot, _allocs in affected_lots if lot.get("status") == "partial"))
          PY

      - name: Detect new deployments
        id: diff
        shell: bash
        run: |
          prev="${{ steps.previous.outputs.count }}"
          curr="${{ steps.current.outputs.count }}"
          prev_sig="${{ steps.processed_previous.outputs.signature }}"
          latest_sig="${{ steps.latest.outputs.signature }}"
          if [[ -n "$latest_sig" && "$latest_sig" != "$prev_sig" ]]; then
            echo "new_deployments=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_deployments=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect new sells
        id: sell_diff
        shell: bash
        run: |
          prev_sig="${{ steps.processed_sell_previous.outputs.signature }}"
          latest_sig="${{ steps.latest_sell.outputs.signature }}"
          if [[ -n "$latest_sig" && "$latest_sig" != "$prev_sig" ]]; then
            echo "new_sells=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_sells=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve new sell summary
        id: sell_summary
        shell: bash
        env:
          PREV_SELL_SIG: ${{ steps.processed_sell_previous.outputs.signature }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          REQUIRED_HINTS = {"SwapLeverToStable"}
          prev_sig = os.environ.get("PREV_SELL_SIG") or ""

          sells = []
          backfill_path = Path("data/stability_pool_balance_changes_full.jsonl")
          if backfill_path.exists():
              with backfill_path.open("r", encoding="utf-8") as handle:
                  for line in handle:
                      line = line.strip()
                      if not line:
                          continue
                      row = json.loads(line)
                      if row.get("action") != "sell_xsol":
                          continue
                      if not REQUIRED_HINTS.issubset(set(row.get("log_hints") or [])):
                          continue
                      sells.append(row)
          sells.sort(key=lambda row: ((row.get("slot") or 0), (row.get("block_time") or 0), (row.get("signature") or "")))

          new_sells = sells
          if prev_sig:
              matches = [idx for idx, row in enumerate(sells) if row.get("signature") == prev_sig]
              if matches:
                  new_sells = sells[matches[-1] + 1 :]

          latest_sell = new_sells[-1] if new_sells else None
          affected_lots = []
          deployments_path = Path("data/stability_pool_deployments.json")
          if latest_sell and deployments_path.exists():
              payload = json.loads(deployments_path.read_text(encoding="utf-8"))
              for lot in payload.get("lots") or []:
                  allocations = [
                      alloc
                      for alloc in (lot.get("sell_allocations") or [])
                      if alloc.get("sell_signature") == latest_sell.get("signature")
                  ]
                  if allocations:
                      affected_lots.append((lot, allocations))

          out_path = Path(os.environ["GITHUB_OUTPUT"])

          def write(key, value):
              with out_path.open("a", encoding="utf-8") as handle:
                  handle.write(f"{key}={value}\n")

          write("count", len(new_sells))
          write("total_xsol_sold", sum(abs(float((row.get("xsol_pool") or {}).get("delta") or 0.0)) for row in new_sells))
          write("total_hyusd_received", sum(float((row.get("hyusd_pool") or {}).get("delta") or 0.0) for row in new_sells))

          if not latest_sell:
              for key in (
                  "latest_signature",
                  "latest_utc",
                  "latest_local",
                  "latest_xsol_sold",
                  "latest_hyusd_received",
                  "latest_sale_price",
                  "affected_lot_count",
                  "closed_lot_count",
                  "partial_lot_count",
              ):
                  write(key, "")
          else:
              write("latest_signature", latest_sell.get("signature") or "")
              write("latest_utc", latest_sell.get("utc") or "")
              write("latest_local", latest_sell.get("local") or "")
              write("latest_xsol_sold", abs(float((latest_sell.get("xsol_pool") or {}).get("delta") or 0.0)))
              write("latest_hyusd_received", float((latest_sell.get("hyusd_pool") or {}).get("delta") or 0.0))
              write("latest_sale_price", latest_sell.get("estimated_hyusd_per_xsol") or "")
              write("affected_lot_count", len(affected_lots))
              write("closed_lot_count", sum(1 for lot, _allocs in affected_lots if lot.get("status") == "closed"))
              write("partial_lot_count", sum(1 for lot, _allocs in affected_lots if lot.get("status") == "partial"))
          PY

      - name: Resolve setup for latest deployment
        id: setup
        shell: bash
        run: |
          latest_sig="${{ steps.latest.outputs.signature }}"
          if [[ -z "$latest_sig" ]]; then
            echo "grade=Unscored" >> "$GITHUB_OUTPUT"
            echo "score=" >> "$GITHUB_OUTPUT"
            echo "expected_24h=" >> "$GITHUB_OUTPUT"
            echo "confidence=No Evidence" >> "$GITHUB_OUTPUT"
            echo "status=Unscored" >> "$GITHUB_OUTPUT"
            echo "reason=No setup matched the latest deployment." >> "$GITHUB_OUTPUT"
            echo "alert_eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "grade=$(jq -r --arg sig "$latest_sig" '([.episodes[] | select(((.signatures // []) | index($sig)) != null)] | first | .setup_grade) // "Unscored"' data/stability_pool_signal_report.json)" >> "$GITHUB_OUTPUT"
          echo "score=$(jq -r --arg sig "$latest_sig" '([.episodes[] | select(((.signatures // []) | index($sig)) != null)] | first | .setup_score // empty)' data/stability_pool_signal_report.json)" >> "$GITHUB_OUTPUT"
          echo "expected_24h=$(jq -r --arg sig "$latest_sig" '([.episodes[] | select(((.signatures // []) | index($sig)) != null)] | first | .setup_expected_24h_return_pct // empty)' data/stability_pool_signal_report.json)" >> "$GITHUB_OUTPUT"
          echo "confidence=$(jq -r --arg sig "$latest_sig" '([.episodes[] | select(((.signatures // []) | index($sig)) != null)] | first | .setup_confidence_bucket) // "No Evidence"' data/stability_pool_signal_report.json)" >> "$GITHUB_OUTPUT"
          echo "status=$(jq -r --arg sig "$latest_sig" '([.episodes[] | select(((.signatures // []) | index($sig)) != null)] | first | .alert_status) // "Unscored"' data/stability_pool_signal_report.json)" >> "$GITHUB_OUTPUT"
          echo "reason=$(jq -r --arg sig "$latest_sig" '([.episodes[] | select(((.signatures // []) | index($sig)) != null)] | first | .alert_reason) // "No setup matched the latest deployment."' data/stability_pool_signal_report.json)" >> "$GITHUB_OUTPUT"
          echo "alert_eligible=$(jq -r --arg sig "$latest_sig" '([.episodes[] | select(((.signatures // []) | index($sig)) != null)] | first | .alert_eligible) // false' data/stability_pool_signal_report.json)" >> "$GITHUB_OUTPUT"

      - name: Build Pages artifact
        shell: bash
        run: |
          rm -rf site
          mkdir -p site/data
          cp stability_pool_deployments.html site/index.html
          cp stability_pool_deployments.html site/stability_pool_deployments.html
          cp stability_pool_onchain_tracker.html site/stability_pool_onchain_tracker.html
          cp hylo_stability_pool_trace_report.html site/hylo_stability_pool_trace_report.html
          cp hylo_viability_report.html site/hylo_viability_report.html
          cp current_buy_xsol_events.html site/current_buy_xsol_events.html
          cp stability_pool_signal_report.html site/stability_pool_signal_report.html
          cp data/stability_pool_deployments.json site/data/stability_pool_deployments.json
          cp data/stability_pool_deployment_marks.jsonl site/data/stability_pool_deployment_marks.jsonl
          cp data/current_buy_xsol_events.json site/data/current_buy_xsol_events.json
          cp data/stability_pool_signal_report.json site/data/stability_pool_signal_report.json
          cp data/xsol_usdc_ohlcv_5m.json site/data/xsol_usdc_ohlcv_5m.json

      - name: Check remote freshness before publish
        id: freshness
        shell: bash
        run: |
          branch="${GITHUB_REF_NAME}"
          synced_sha="${{ steps.synced.outputs.sha }}"
          git fetch origin "${branch}"
          remote_sha="$(git rev-parse "origin/${branch}")"
          if [[ "$remote_sha" == "$synced_sha" ]]; then
            echo "remote_unchanged=true" >> "$GITHUB_OUTPUT"
          else
            echo "remote_unchanged=false" >> "$GITHUB_OUTPUT"
            echo "Remote advanced during run: ${synced_sha} -> ${remote_sha}"
          fi

      - name: Send ntfy alert
        if: steps.freshness.outputs.remote_unchanged == 'true' && steps.diff.outputs.new_deployments == 'true' && steps.setup.outputs.alert_eligible == 'true' && env.NTFY_TOPIC != ''
        env:
          PAGES_URL: ${{ steps.meta.outputs.pages_url }}
        shell: bash
        run: |
          latest_json="$(jq -r '.lots[-1] | @json' data/stability_pool_deployments.json)"
          amount="$(echo "$latest_json" | jq -r '.xsol_bought | tostring')"
          spent="$(echo "$latest_json" | jq -r '.entry_value | tostring')"
          local_time="$(echo "$latest_json" | jq -r '.local')"
          tx="$(echo "$latest_json" | jq -r '.signature')"
          setup_grade="${{ steps.setup.outputs.grade }}"
          setup_score="${{ steps.setup.outputs.score }}"
          setup_expected_24h="${{ steps.setup.outputs.expected_24h }}"
          setup_confidence="${{ steps.setup.outputs.confidence }}"
          setup_reason="${{ steps.setup.outputs.reason }}"
          title="Hylo Stability Pool setup cleared alert bar"
          body="New confirmed deployment at ${local_time}\nxSOL: ${amount}\nhyUSD spent: ${spent}\nSetup: ${setup_grade}"
          if [[ -n "$setup_score" ]]; then
            body="${body} • score ${setup_score}"
          fi
          if [[ -n "$setup_expected_24h" ]]; then
            body="${body} • exp 24h ${setup_expected_24h}%"
          fi
          body="${body}\nConfidence: ${setup_confidence}\nWhy: ${setup_reason}\nDashboard: ${PAGES_URL}\nTx: https://solscan.io/tx/${tx}"
          if [[ -n "$NTFY_AUTH_HEADER" ]]; then
            curl --silent --show-error \
              -H "$NTFY_AUTH_HEADER" \
              -H "Title: ${title}" \
              -d "$body" \
              "https://ntfy.sh/${NTFY_TOPIC}"
          else
            curl --silent --show-error \
              -H "Title: ${title}" \
              -d "$body" \
              "https://ntfy.sh/${NTFY_TOPIC}"
          fi

      - name: Send ntfy sell alert
        if: steps.freshness.outputs.remote_unchanged == 'true' && steps.sell_diff.outputs.new_sells == 'true' && env.NTFY_TOPIC != ''
        env:
          PAGES_URL: ${{ steps.meta.outputs.pages_url }}
        shell: bash
        run: |
          sell_count="${{ steps.sell_summary.outputs.count }}"
          sell_time="${{ steps.sell_summary.outputs.latest_local }}"
          if [[ -z "$sell_time" ]]; then
            sell_time="${{ steps.sell_summary.outputs.latest_utc }}"
          fi
          sold="${{ steps.sell_summary.outputs.latest_xsol_sold }}"
          received="${{ steps.sell_summary.outputs.latest_hyusd_received }}"
          total_sold="${{ steps.sell_summary.outputs.total_xsol_sold }}"
          total_received="${{ steps.sell_summary.outputs.total_hyusd_received }}"
          sale_price="${{ steps.sell_summary.outputs.latest_sale_price }}"
          affected_lots="${{ steps.sell_summary.outputs.affected_lot_count }}"
          closed_lots="${{ steps.sell_summary.outputs.closed_lot_count }}"
          partial_lots="${{ steps.sell_summary.outputs.partial_lot_count }}"
          tx="${{ steps.sell_summary.outputs.latest_signature }}"
          title="Hylo Stability Pool sold xSOL"
          body="Confirmed xSOL sale at ${sell_time}\nxSOL sold: ${sold}\nhyUSD received: ${received}"
          if [[ -n "$sell_count" && "$sell_count" != "1" ]]; then
            title="Hylo Stability Pool recorded ${sell_count} xSOL sells"
            body="New confirmed xSOL sells: ${sell_count}\nTotal xSOL sold: ${total_sold}\nTotal hyUSD received: ${total_received}\nLatest sell at ${sell_time}\nLatest xSOL sold: ${sold}\nLatest hyUSD received: ${received}"
          fi
          if [[ -n "$sale_price" ]]; then
            body="${body}\nSale price: ${sale_price}"
          fi
          if [[ -n "$affected_lots" ]]; then
            body="${body}\nAffected lots: ${affected_lots}"
          fi
          if [[ -n "$closed_lots" && "$closed_lots" != "0" ]]; then
            body="${body}\nClosed lots: ${closed_lots}"
          fi
          if [[ -n "$partial_lots" && "$partial_lots" != "0" ]]; then
            body="${body}\nPartial lots: ${partial_lots}"
          fi
          body="${body}\nDashboard: ${PAGES_URL}\nTx: https://solscan.io/tx/${tx}"
          if [[ -n "$NTFY_AUTH_HEADER" ]]; then
            curl --silent --show-error \
              -H "$NTFY_AUTH_HEADER" \
              -H "Title: ${title}" \
              -d "$body" \
              "https://ntfy.sh/${NTFY_TOPIC}"
          else
            curl --silent --show-error \
              -H "Title: ${title}" \
              -d "$body" \
              "https://ntfy.sh/${NTFY_TOPIC}"
          fi

      - name: Record latest processed deployment signature
        if: steps.freshness.outputs.remote_unchanged == 'true' && steps.diff.outputs.new_deployments == 'true'
        shell: bash
        run: |
          printf '%s\n' '${{ steps.latest.outputs.signature }}' > data/last_processed_deployment_signature.txt

      - name: Record latest processed sell signature
        if: steps.freshness.outputs.remote_unchanged == 'true' && steps.sell_diff.outputs.new_sells == 'true'
        shell: bash
        run: |
          printf '%s\n' '${{ steps.sell_summary.outputs.latest_signature }}' > data/last_processed_sell_signature.txt

      - name: Record latest alerted deployment signature
        if: steps.freshness.outputs.remote_unchanged == 'true' && steps.diff.outputs.new_deployments == 'true' && steps.setup.outputs.alert_eligible == 'true'
        shell: bash
        run: |
          printf '%s\n' '${{ steps.latest.outputs.signature }}' > data/last_alerted_deployment_signature.txt

      - name: Commit updated tracker artifacts
        if: steps.freshness.outputs.remote_unchanged == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/live_hylo_stats.json \
            data/last_processed_deployment_signature.txt \
            data/last_processed_sell_signature.txt \
            data/last_alerted_deployment_signature.txt \
            data/stability_pool_balance_changes_full.jsonl \
            data/stability_pool_deployments.json \
            data/stability_pool_deployment_marks.jsonl \
            data/current_buy_xsol_events.json \
            data/stability_pool_signal_report.json \
            data/xsol_usdc_ohlcv_5m.json \
            stability_pool_deployments.html \
            current_buy_xsol_events.html \
            stability_pool_signal_report.html
          if ! git diff --cached --quiet; then
            git commit -m "Update stability pool tracker [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Upload Pages artifact
        if: steps.freshness.outputs.remote_unchanged == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: needs.build.result == 'success' && needs.build.outputs.remote_unchanged == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
